    <nav>
      <img src="img/logo.svg.svg" width="200" />
      <h1>Aroma</h1>
      <ul class="nav-links" id="navLinks">
        <li><a href="#" class="nav-link" data-view="home">Inicio</a></li>

      <main>
      <section id="view-home" class="view active">
        <h2>Inicio</h2>
        <p>Bienvenido a la cafeteria</p>
      </section>

      <section id="view-menu" class="view">
        <h2>Menu</h2>
        <p>Nuestros productos disponibles</p>
        <div id="products-container" class="products-container"></div>
      </section>

      <!-- CARRITO -->
      <section id="view-cart" class="view">
        <h2>Carrito</h2>
        <p>Productos agregados</p>

        <div id="cart-container"></div>
      </section>

      <!-- CONTACTO -->
      <section id="view-contact" class="view">

        <div  class="section-header"> <h2>Contacto</h2>
        <p>Escribinos y te responderemos pronto</p></div>
        <form novalidate>
          <div class="form-group">
            <label for="contact name">nombre completo</label>
          <input type="text" id="contact-name" placeholder="Ej: Juan Perez">
          <small id="error-msg" class="error-name" ></small>
        </div>
          
<label for="contact-email" >correo electronico</label>
<input 

type="email" 
id="contact-email"
rows="4"
placeholder="juan@gmail.com"/>
<label for="contact-message">Mensaje</label>
<textarea 
name="" 
id="contact-message"
rows="4"
placeholder="En que podemos ayudarte"></textarea>
<small class="error-msg" id="error-messge" ></small>
<button  type="submit" class=""></button>

        </form>
       
      </section>
